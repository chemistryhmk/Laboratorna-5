<!DOCTYPE html>
<html lang="uk">
<head><meta charset="UTF-8"><title>Дослід 2</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;padding:12px;background:#fff;color:#222}
@keyframes bup  {0%{transform:translateY(0);opacity:.85}100%{transform:translateY(-28px);opacity:0}}
@keyframes bfst {0%{transform:translateY(0);opacity:.85}100%{transform:translateY(-28px);opacity:0}}
@keyframes flow-e{0%{stroke-dashoffset:20}100%{stroke-dashoffset:0}}
@keyframes fadein{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes rust-appear{0%{opacity:0}100%{opacity:1}}
.btn-step{padding:6px 10px;font-size:12.5px;font-weight:500;border:1px solid #ccc;border-radius:8px;background:#f5f5f5;color:#222;cursor:pointer;white-space:nowrap}
.btn-step.active{background:#dbeafe;color:#1d4ed8;border-color:#93c5fd}
.obs-box{border-radius:8px;padding:9px 13px;font-size:13px;animation:fadein .35s ease both}
#signup-screen{animation:fadein .4s ease both}
#lab-screen{display:none;animation:fadein .4s ease both}
input{width:100%;padding:8px 11px;font-size:14px;border:1px solid #ccc;border-radius:8px;outline:none}
</style>
</head>
<body>

<div id="signup-screen" style="padding:1rem 0">
  <div style="text-align:center;margin-bottom:1.25rem">
    <p style="font-size:11px;letter-spacing:.08em;color:#888;margin:0 0 5px;text-transform:uppercase">Лабораторна робота</p>
    <p style="font-size:18px;font-weight:500;margin:0 0 3px">Дослід № 2</p>
    <p style="font-size:13px;color:#555;margin:0">«Дослідження корозії заліза у контакті з оловом та цинком»</p>
  </div>
  <div style="background:#f9f9f9;border:1px solid #e0e0e0;border-radius:12px;padding:1.25rem;max-width:380px;margin:0 auto">
    <p style="font-size:13px;color:#555;margin:0 0 .9rem">Для початку роботи підпишіть звіт:</p>
    <div style="margin-bottom:10px">
      <label style="font-size:12px;color:#666;display:block;margin-bottom:3px">Прізвище</label>
      <input id="inp-last" type="text" placeholder="Іваненко" oninput="checkForm()"/>
    </div>
    <div style="margin-bottom:1.1rem">
      <label style="font-size:12px;color:#666;display:block;margin-bottom:3px">Ім'я</label>
      <input id="inp-first" type="text" placeholder="Олексій" oninput="checkForm()"/>
    </div>
    <button id="start-btn" onclick="startLab()" disabled
      style="width:100%;padding:9px;font-size:14px;font-weight:500;cursor:not-allowed;border:1px solid #ccc;border-radius:8px;background:#f0f0f0;color:#999;transition:all .2s">
      Розпочати дослід
    </button>
  </div>
</div>

<div id="lab-screen">
  <div style="border-bottom:1px solid #e0e0e0;padding-bottom:.6rem;margin-bottom:.75rem">
    <p style="font-size:11px;letter-spacing:.08em;color:#888;margin:0 0 1px;text-transform:uppercase">Лабораторна робота</p>
    <p style="font-size:15px;font-weight:500;margin:0 0 1px">Дослід № 2 · «Дослідження корозії заліза у контакті з оловом та цинком»</p>
    <p id="student-name-display" style="font-size:13px;color:#555;margin:0"></p>
  </div>

  <div style="display:flex;gap:5px;margin-bottom:.75rem;flex-wrap:wrap">
    <button class="btn-step active" id="s0" onclick="setStage(0)">Підготовка</button>
    <button class="btn-step" id="s1" onclick="setStage(1)">+ H₂SO₄</button>
    <button class="btn-step" id="s2" onclick="setStage(2)">+ K₃[Fe(CN)₆]</button>
    <button class="btn-step" id="s3" onclick="setStage(3)">Fe + Zn</button>
    <button class="btn-step" id="s4" onclick="setStage(4)">Fe + Sn</button>
    <button class="btn-step" id="s5" onclick="setStage(5)">Спостереження</button>
    <button class="btn-step" id="s6" onclick="setStage(6)">Завдання</button>
  </div>

  <svg id="main" width="100%" viewBox="0 0 680 248" style="display:block">
    <defs>
      <marker id="earr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </marker>
      <clipPath id="cl1"><path d="M144 88 L144 196 Q144 212 170 212 Q196 212 196 196 L196 88 Z"/></clipPath>
      <clipPath id="cl2"><path d="M484 88 L484 196 Q484 212 510 212 Q536 212 536 196 L536 88 Z"/></clipPath>
    </defs>

    <!-- TUBE 1 -->
    <text x="170" y="13" text-anchor="middle" fill="#222" font-size="14" font-family="sans-serif" font-weight="500">Пробірка 1</text>
    <text x="170" y="26" text-anchor="middle" fill="#666" font-size="12" font-family="sans-serif">Fe + Zn (оцинкований дріт)</text>
    <path d="M141 34 L141 196 Q141 216 170 216 Q199 216 199 196 L199 34" fill="none" stroke="#b0b0b0" stroke-width="1.5"/>
    <path d="M144 34 L144 196 Q144 212 170 212 Q196 212 196 196 L196 34" fill="#eeeeee" opacity=".25"/>
    <line x1="138" y1="34" x2="202" y2="34" stroke="#b0b0b0" stroke-width="1.5"/>
    <line x1="148" y1="38" x2="148" y2="194" stroke="white" stroke-width="2" opacity=".4"/>

    <rect id="liq1" x="144" y="88" width="52" height="124" fill="#e8f4ff" opacity=".4" clip-path="url(#cl1)" style="transition:fill 1.2s ease,opacity 1.2s ease"/>
    <line x1="144" y1="88" x2="196" y2="88" stroke="#7ab0d0" stroke-width=".8" opacity=".7"/>
    <text id="liq1-label" x="170" y="82" text-anchor="middle" fill="#4a7898" font-size="10" font-family="sans-serif">H₂O</text>

    <g id="fe-wire1" opacity="0">
      <rect x="163" y="42" width="6" height="130" rx="3" fill="#909098" stroke="#686870" stroke-width=".7"/>
      <rect x="164" y="44" width="2" height="126" rx="1" fill="#b8b8c0" opacity=".4"/>
    </g>
    <g id="zn-chunk" opacity="0">
      <ellipse cx="166" cy="178" rx="13" ry="8"   fill="#7a7a82" stroke="#565660" stroke-width=".8"/>
      <ellipse cx="166" cy="176" rx="10" ry="5"   fill="#9292a0"/>
      <ellipse cx="163" cy="174" rx="4"  ry="2.2" fill="#b4b4c0" opacity=".6"/>
      <ellipse cx="170" cy="177" rx="2"  ry="1.2" fill="#606068" opacity=".4"/>
    </g>
    <text id="fe1-lbl" x="204" y="105" fill="#606068" font-size="11" font-family="sans-serif" opacity="0">Fe</text>
    <text id="zn-lbl"  x="204" y="182" fill="#505058" font-size="11" font-family="sans-serif" opacity="0">Zn</text>
    <g id="bubbles1"></g>
    <text id="h2lbl1"  x="135" y="128" text-anchor="end" fill="#3a68a0" font-size="11" font-family="sans-serif" opacity="0">H₂↑</text>
    <text id="h2lbl1b" x="135" y="141" text-anchor="end" fill="#3a68a0" font-size="11" font-family="sans-serif" opacity="0">(на Fe)</text>
    <path id="eflow1" d="M166 172 Q162 158 162 146" fill="none" stroke="#c06010" stroke-width="1.5" stroke-dasharray="3 3" marker-end="url(#earr)" opacity="0" style="animation:flow-e .9s linear infinite"/>
    <text id="eflow1-lbl" x="170" y="234" text-anchor="middle" fill="#c06010" font-size="11" font-family="sans-serif" opacity="0">e⁻ від Zn до Fe</text>

    <!-- TUBE 2 -->
    <text x="510" y="13" text-anchor="middle" fill="#222" font-size="14" font-family="sans-serif" font-weight="500">Пробірка 2</text>
    <text x="510" y="26" text-anchor="middle" fill="#666" font-size="12" font-family="sans-serif">Fe + Sn (лужений дріт)</text>
    <path d="M481 34 L481 196 Q481 216 510 216 Q539 216 539 196 L539 34" fill="none" stroke="#b0b0b0" stroke-width="1.5"/>
    <path d="M484 34 L484 196 Q484 212 510 212 Q536 212 536 196 L536 34" fill="#eeeeee" opacity=".25"/>
    <line x1="478" y1="34" x2="542" y2="34" stroke="#b0b0b0" stroke-width="1.5"/>
    <line x1="488" y1="38" x2="488" y2="194" stroke="white" stroke-width="2" opacity=".4"/>

    <rect id="liq2" x="484" y="88" width="52" height="124" fill="#e8f4ff" opacity=".4" clip-path="url(#cl2)" style="transition:fill 1.2s ease,opacity 1.2s ease"/>
    <line x1="484" y1="88" x2="536" y2="88" stroke="#7ab0d0" stroke-width=".8" opacity=".7"/>
    <text id="liq2-label" x="510" y="82" text-anchor="middle" fill="#4a7898" font-size="10" font-family="sans-serif">H₂O</text>

    <g id="fe-wire2" opacity="0">
      <rect x="503" y="42" width="6" height="130" rx="3" fill="#909098" stroke="#686870" stroke-width=".7"/>
      <rect x="504" y="44" width="2" height="126" rx="1" fill="#b8b8c0" opacity=".4"/>
    </g>
    <g id="sn-chunk" opacity="0">
      <ellipse cx="506" cy="178" rx="13" ry="8"   fill="#c8ccd4" stroke="#989ca8" stroke-width=".8"/>
      <ellipse cx="506" cy="176" rx="10" ry="5"   fill="#d8dce4"/>
      <ellipse cx="503" cy="174" rx="4"  ry="2.2" fill="#eceef4" opacity=".7"/>
      <ellipse cx="510" cy="177" rx="2"  ry="1.2" fill="#a8acb8" opacity=".4"/>
    </g>
    <text id="fe2-lbl" x="544" y="105" fill="#606068" font-size="11" font-family="sans-serif" opacity="0">Fe</text>
    <text id="sn-lbl"  x="544" y="182" fill="#707888" font-size="11" font-family="sans-serif" opacity="0">Sn</text>

    <!-- RUST: realistic layered patches along wire surface -->
    <g id="rust-layer" opacity="0">
      <!-- patch 1 top -->
      <ellipse cx="506" cy="108" rx="4.5" ry="2.8" fill="#c84820" opacity="0" style="animation:rust-appear 1.0s ease-out 0.3s forwards"/>
      <ellipse cx="507.5" cy="107" rx="2.8" ry="1.6" fill="#e8722a" opacity="0" style="animation:rust-appear 1.0s ease-out 0.5s forwards"/>
      <ellipse cx="504.5" cy="109" rx="1.8" ry="1.0" fill="#943010" opacity="0" style="animation:rust-appear 1.0s ease-out 0.7s forwards"/>
      <!-- drip from patch 1 -->
      <ellipse cx="506" cy="113" rx="1.5" ry="2.5" fill="#b84018" opacity="0" style="animation:rust-appear 1.0s ease-out 0.9s forwards"/>

      <!-- patch 2 -->
      <ellipse cx="506" cy="124" rx="5"   ry="3.0" fill="#b84018" opacity="0" style="animation:rust-appear 1.2s ease-out 1.1s forwards"/>
      <ellipse cx="508" cy="123" rx="3.2" ry="1.8" fill="#d86828" opacity="0" style="animation:rust-appear 1.2s ease-out 1.3s forwards"/>
      <ellipse cx="504" cy="125" rx="2.2" ry="1.3" fill="#8a2c10" opacity="0" style="animation:rust-appear 1.2s ease-out 1.5s forwards"/>
      <ellipse cx="506.5" cy="129" rx="1.3" ry="2.2" fill="#a03818" opacity="0" style="animation:rust-appear 1.2s ease-out 1.6s forwards"/>

      <!-- patch 3 large middle -->
      <ellipse cx="506" cy="140" rx="5.5" ry="3.5" fill="#c04820" opacity="0" style="animation:rust-appear 1.3s ease-out 1.7s forwards"/>
      <ellipse cx="508.5" cy="138" rx="3.5" ry="2.2" fill="#e07838" opacity="0" style="animation:rust-appear 1.3s ease-out 1.9s forwards"/>
      <ellipse cx="504"   cy="142" rx="2.8" ry="1.8" fill="#983820" opacity="0" style="animation:rust-appear 1.3s ease-out 2.1s forwards"/>
      <ellipse cx="506"   cy="145" rx="2"   ry="3"   fill="#b04020" opacity="0" style="animation:rust-appear 1.3s ease-out 2.2s forwards"/>

      <!-- patch 4 lower -->
      <ellipse cx="506" cy="156" rx="4.5" ry="2.8" fill="#b84018" opacity="0" style="animation:rust-appear 1.1s ease-out 2.3s forwards"/>
      <ellipse cx="507.5" cy="155" rx="2.8" ry="1.6" fill="#d06030" opacity="0" style="animation:rust-appear 1.1s ease-out 2.5s forwards"/>
      <ellipse cx="505"   cy="158" rx="1.8" ry="1.0" fill="#8a2c10" opacity="0" style="animation:rust-appear 1.1s ease-out 2.6s forwards"/>
    </g>

    <!-- blue overlay T2 -->
    <rect id="blue-overlay" x="484" y="88" width="52" height="124" fill="#1a3fa0" opacity="0" clip-path="url(#cl2)" style="transition:opacity 2s ease"/>

    <g id="bubbles2"></g>
    <text id="h2lbl2"  x="546" y="148" fill="#3a68a0" font-size="11" font-family="sans-serif" opacity="0">H₂↑</text>
    <text id="h2lbl2b" x="546" y="161" fill="#3a68a0" font-size="11" font-family="sans-serif" opacity="0">(на Sn)</text>
    <path id="eflow2" d="M506 172 Q509 158 509 146" fill="none" stroke="#c06010" stroke-width="1.5" stroke-dasharray="3 3" marker-end="url(#earr)" opacity="0" style="animation:flow-e .9s linear infinite"/>
    <text id="eflow2-lbl" x="510" y="234" text-anchor="middle" fill="#c06010" font-size="11" font-family="sans-serif" opacity="0">e⁻ від Fe до Sn</text>

    <text id="result-lbl"  x="340" y="120" text-anchor="middle" fill="#dc2626" font-size="13" font-family="sans-serif" opacity="0">Пробірка 2 — синіє! Fe²⁺ → корозія заліза</text>
    <text id="result-lbl2" x="340" y="136" text-anchor="middle" fill="#16a34a" font-size="13" font-family="sans-serif" opacity="0">Пробірка 1 — розчин чистий! Fe захищений</text>
  </svg>

  <div id="info-panel" style="margin-top:.5rem"></div>
</div>

<script>
var SVG_NS='http://www.w3.org/2000/svg';
var B1=[{cx:161,cy:157,r:2.5,delay:'.5s',dur:'3.4s'},{cx:168,cy:138,r:2,delay:'1.7s',dur:'3.4s'},{cx:160,cy:120,r:2.5,delay:'2.9s',dur:'3.4s'}];
var B2=[{cx:509,cy:162,r:3,delay:'.2s',dur:'1.6s'},{cx:509,cy:143,r:2.5,delay:'.8s',dur:'1.6s'},{cx:509,cy:124,r:3,delay:'1.3s',dur:'1.6s'},{cx:509,cy:106,r:2,delay:'.5s',dur:'1.6s'}];
function mkB(d,a){var c=document.createElementNS(SVG_NS,'circle');c.setAttribute('cx',d.cx);c.setAttribute('cy',d.cy);c.setAttribute('r',d.r);c.setAttribute('fill','none');c.setAttribute('stroke','#70a8d8');c.setAttribute('stroke-width','1');c.style.animation=a+' '+d.dur+' ease-in '+d.delay+' infinite';return c;}
function showB(id,data,a){var g=document.getElementById(id);while(g.firstChild)g.removeChild(g.firstChild);data.forEach(function(d){g.appendChild(mkB(d,a));});}
function hideB(id){var g=document.getElementById(id);while(g.firstChild)g.removeChild(g.firstChild);}
function vis(id,on){var e=document.getElementById(id);if(e)e.style.opacity=on?'1':'0';}
function setLiq(id,fill,op){var e=document.getElementById(id);if(e){e.style.fill=fill;e.style.opacity=op;}}

function checkForm(){
  var l=document.getElementById('inp-last').value.trim(),f=document.getElementById('inp-first').value.trim(),btn=document.getElementById('start-btn'),ok=l&&f;
  btn.disabled=!ok;btn.style.cursor=ok?'pointer':'not-allowed';btn.style.background=ok?'#dbeafe':'#f0f0f0';btn.style.color=ok?'#1d4ed8':'#999';btn.style.borderColor=ok?'#93c5fd':'#ccc';
}
function startLab(){
  var l=document.getElementById('inp-last').value.trim(),f=document.getElementById('inp-first').value.trim();
  if(!l||!f)return;
  document.getElementById('student-name-display').textContent='Студент: '+l+' '+f;
  document.getElementById('signup-screen').style.display='none';
  document.getElementById('lab-screen').style.display='block';
  setStage(0);
}

var infos=[
'<div class="obs-box" style="background:#f9f9f9;border:1px solid #e0e0e0"><p style="font-weight:500;margin:0 0 4px">Підготовка досліду</p><p style="color:#555;margin:0">Беремо чисту пробірку, наливаємо дистильовану воду на ½ об\'єму. Обидві пробірки містять лише воду — розчин <strong>прозорий</strong>.</p></div>',

'<div class="obs-box" style="background:#fefce8;border:1px solid #fde047"><p style="font-weight:500;color:#854d0e;margin:0 0 6px">Крок 1 — додавання H₂SO₄</p><div style="display:flex;align-items:center;gap:10px;margin-bottom:6px"><span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:#d0c020;flex-shrink:0"></span><span style="font-size:13px"><strong>4–5 крапель</strong> розведеної сульфатної кислоти H₂SO₄</span></div><p style="color:#555;font-size:13px;margin:0">Розчин залишається <strong>прозорим</strong> — кислота безбарвна. Середовище стає кислим (pH зменшується).</p></div>',

'<div class="obs-box" style="background:#fef9c3;border:1px solid #fbbf24"><p style="font-weight:500;color:#92400e;margin:0 0 6px">Крок 2 — додавання K₃[Fe(CN)₆]</p><div style="display:flex;align-items:center;gap:10px;margin-bottom:6px"><span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:#d4920a;flex-shrink:0"></span><span style="font-size:13px"><strong>2–3 краплі</strong> червоної кров\'яної солі K₃[Fe(CN)₆]</span></div><p style="color:#555;font-size:13px;margin:0 0 5px">Розчин набуває <strong>блідо-жовтого</strong> забарвлення — колір самого реактиву.</p><p style="color:#555;font-size:12px;margin:0">При появі Fe²⁺ реактив утворює <strong>турнбулеву синь</strong> — яскраво-синє забарвлення. Розчин розмішати і розділити на дві пробірки.</p></div>',

'<div class="obs-box" style="background:#dcfce7;border:1px solid #86efac"><p style="font-weight:500;color:#166534;margin:0 0 4px">Пробірка 1 — Fe + Zn</p><p style="margin:0 0 5px">Zn активніший за Fe → Zn стає <strong>анодом</strong>, Fe — катодом гальванічної пари.</p><p style="color:#555;margin:0;font-size:12px">Розчин залишається <strong>блідо-жовтим</strong> — Fe²⁺ не утворюється, залізо захищене. Бульбашки H₂ повільно виділяються на залізному дроті (катод).</p></div>',

'<div class="obs-box" style="background:#fee2e2;border:1px solid #fca5a5"><p style="font-weight:500;color:#991b1b;margin:0 0 4px">Пробірка 2 — Fe + Sn</p><p style="margin:0 0 5px">Sn менш активне за Fe → Fe стає <strong>анодом</strong>, Sn — катодом гальванічної пари.</p><p style="color:#555;margin:0;font-size:12px">Розчин синіє — K₃[Fe(CN)₆] реагує з Fe²⁺ → <strong>турнбулева синь</strong>. На дроті видно іржу. Бульбашки H₂ виділяються на олові (катод).</p></div>',

'<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px"><div class="obs-box" style="background:#dcfce7;border:1px solid #86efac"><p style="font-weight:500;color:#166534;margin:0 0 4px">Пробірка 1 — Fe + Zn</p><ul style="margin:0;padding-left:15px;line-height:1.9"><li>Розчин <strong>блідо-жовтий</strong></li><li>Fe²⁺ не виявлено</li><li>Zn — анод (руйнується)</li><li>Fe — катод (H₂ на Fe)</li></ul></div><div class="obs-box" style="background:#fee2e2;border:1px solid #fca5a5"><p style="font-weight:500;color:#991b1b;margin:0 0 4px">Пробірка 2 — Fe + Sn</p><ul style="margin:0;padding-left:15px;line-height:1.9"><li>Розчин <strong>синіє</strong> — є Fe²⁺</li><li>Турнбулева синь</li><li>Fe — анод (іржавіє)</li><li>Sn — катод (H₂ на Sn)</li></ul></div></div>',

'<div style="display:grid;gap:8px"><div class="obs-box" style="background:#f9f9f9;border:1px solid #e0e0e0"><p style="font-weight:500;margin:0 0 6px">Завдання для звіту</p><p style="color:#555;margin:0 0 8px">За аналогією з Дослідом № 1 запишіть:</p><div style="display:grid;gap:6px"><div style="background:#fef9c3;border-radius:6px;padding:8px 12px;font-size:13px"><strong>1.</strong> Рівняння анодного процесу для пробірки 1 (Fe + Zn) та пробірки 2 (Fe + Sn)</div><div style="background:#dbeafe;border-radius:6px;padding:8px 12px;font-size:13px"><strong>2.</strong> Рівняння катодного процесу (водневе деполяризування) для кожної пробірки</div><div style="background:#f9f9f9;border:1px solid #e0e0e0;border-radius:6px;padding:8px 12px;font-size:13px"><strong>3.</strong> Чому в пробірці 1 Fe захищене, а в пробірці 2 кородує?</div><div style="background:#dcfce7;border-radius:6px;padding:8px 12px;font-size:13px"><strong>4.</strong> Загальний висновок про роль активності металів при контактній корозії</div></div></div></div>'
];

function setStage(n){
  for(var i=0;i<7;i++) document.getElementById('s'+i).classList.toggle('active',i===n);
  ['fe-wire1','zn-chunk','fe1-lbl','zn-lbl','fe-wire2','sn-chunk','fe2-lbl','sn-lbl',
   'rust-layer','eflow1','eflow1-lbl','eflow2','eflow2-lbl',
   'result-lbl','result-lbl2','h2lbl1','h2lbl1b','h2lbl2','h2lbl2b'
  ].forEach(function(id){vis(id,false);});
  hideB('bubbles1'); hideB('bubbles2');
  document.getElementById('blue-overlay').style.opacity='0';

  /* default: clear water */
  setLiq('liq1','#e8f4ff','.4');
  setLiq('liq2','#e8f4ff','.4');
  document.getElementById('liq1-label').textContent='H₂O';
  document.getElementById('liq2-label').textContent='H₂O';

  if(n>=1){
    /* after H2SO4: still clear */
    setLiq('liq1','#f0f8ff','.45');
    setLiq('liq2','#f0f8ff','.45');
    document.getElementById('liq1-label').textContent='H₂O + H₂SO₄';
    document.getElementById('liq2-label').textContent='H₂O + H₂SO₄';
  }
  if(n>=2){
    /* after reagent: pale yellow */
    setLiq('liq1','#e8d020','.32');
    setLiq('liq2','#e8d020','.32');
    document.getElementById('liq1-label').textContent='H₂SO₄ + K₃[Fe(CN)₆]';
    document.getElementById('liq2-label').textContent='H₂SO₄ + K₃[Fe(CN)₆]';
  }
  if(n>=3){
    vis('fe-wire1',true); vis('zn-chunk',true);
    vis('fe1-lbl',true);  vis('zn-lbl',true);
    showB('bubbles1',B1,'bup');
    vis('h2lbl1',true); vis('h2lbl1b',true);
    vis('eflow1',true); vis('eflow1-lbl',true);
  }
  if(n>=4){
    vis('fe-wire2',true); vis('sn-chunk',true);
    vis('fe2-lbl',true);  vis('sn-lbl',true);
    vis('rust-layer',true);
    showB('bubbles2',B2,'bfst');
    vis('h2lbl2',true); vis('h2lbl2b',true);
    vis('eflow2',true); vis('eflow2-lbl',true);
    setTimeout(function(){ document.getElementById('blue-overlay').style.opacity='.42'; }, 300);
  }
  if(n>=5){
    vis('result-lbl',true); vis('result-lbl2',true);
  }
  document.getElementById('info-panel').innerHTML=infos[n]||'';
}

document.getElementById('inp-last').addEventListener('keydown',function(e){if(e.key==='Enter')document.getElementById('inp-first').focus();});
document.getElementById('inp-first').addEventListener('keydown',function(e){if(e.key==='Enter'){var b=document.getElementById('start-btn');if(!b.disabled)startLab();}});
</script>
</body>
</html>
